name: ai-nft-forge-local

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_nft_forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_nft_forge}
      POSTGRES_DB: ${POSTGRES_DB:-ai_nft_forge}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1"
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-56379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ai-nft-forge}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ai-nft-forge-local}
    ports:
      - "${MINIO_API_PORT:-59000}:9000"
      - "${MINIO_CONSOLE_PORT:-59001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ai-nft-forge}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ai-nft-forge-local}
      MINIO_BUCKET_PRIVATE: ${MINIO_BUCKET_PRIVATE:-ai-nft-forge-private}
      MINIO_BUCKET_PUBLIC: ${MINIO_BUCKET_PUBLIC:-ai-nft-forge-public}
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb --ignore-existing "local/$$MINIO_BUCKET_PRIVATE" &&
        mc mb --ignore-existing "local/$$MINIO_BUCKET_PUBLIC" &&
        mc anonymous set download "local/$$MINIO_BUCKET_PUBLIC"

volumes:
  postgres-data:
  redis-data:
  minio-data:
